@if (isOpen()) {
<div
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-200">
    <div
        class="bg-white rounded-2xl shadow-2xl w-full [max-width:var(--modal-width,600px)] max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
        <!-- Header -->
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
            <h3 class="text-lg font-semibold text-slate-800">{{ title() }}</h3>
            <button (click)="close.emit()" class="text-slate-400 hover:text-slate-600 transition-colors">
                ✕
            </button>
        </div>

        <!-- Content -->
        <div class="p-6 overflow-y-auto">
            <ng-content />
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
            <ng-content select="[footer]" />
        </div>
    </div>
</div>
}
