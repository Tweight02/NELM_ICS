<!-- Top Navbar -->
<header class="h-20 bg-white border-b border-slate-200 flex items-center px-6 gap-6 fixed top-0 left-0 right-0 z-20">
    <!-- Logo -->
    <div class="flex items-center gap-3 w-64 shrink-0">
        <div class="w-10 h-10 rounded-xl bg-brand flex items-center justify-center text-white bg-emerald-900">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
            </svg>
        </div>
        <div class="leading-tight">
            <div class="font-bold text-slate-900 text-lg">North East Luzon Mission</div>
            <div class="text-xs text-slate-500 -mt-0.5">Church Ministry Reporting</div>
        </div>
    </div>

    <!-- Portal pill -->
    <div class="flex items-center gap-2 bg-green-50 text-brand font-semibold text-sm px-4 py-2 rounded-full shrink-0">
        <span class="w-2 h-2 rounded-full bg-brand bg-emerald-900"></span>
        {{ portalLabel() }}
    </div>

    <!-- Right side -->
    <div class="flex items-center gap-5 ml-auto shrink-0">
        <button class="relative text-slate-500 hover:text-slate-700">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
            </svg>
            <span class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 rounded-full bg-green-500 ring-2 ring-white"></span>
        </button>

        <div class="w-px h-8 bg-slate-200"></div>

        <div class="flex items-center gap-3 cursor-pointer">
            <img src="https://i.pravatar.cc/80?img=13" alt="Ptr. John Doe"
                class="w-10 h-10 rounded-full object-cover" />
            <div class="leading-tight">
                <div class="font-semibold text-slate-900 text-sm">Ptr. John Doe</div>
                <div class="text-xs text-slate-500">District Pastor</div>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
        </div>
    </div>
</header>

<aside
    class="w-64 bg-gradient-to-b from-emerald-900 to-emerald-950 min-h-[calc(100vh-5rem)] fixed left-0 top-20 flex flex-col justify-between px-4 py-6">
    <nav class="flex flex-col gap-1">
        <div class="text-green-200/70 text-xs font-semibold tracking-wider px-3 mb-3">{{ portalLabel() }}</div>
        @for (item of items(); track item.path) {
        <a [routerLink]="item.path" routerLinkActive="bg-emerald-800 text-white"
            [routerLinkActiveOptions]="{ exact: false }"
            class="flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium text-emerald-100 transition-colors hover:bg-emerald-800/60 hover:text-white">
            @if (item.icon) {
            <i [class]="'h-4 w-4 shrink-0 fa-solid ' + item.icon" aria-hidden="true"></i>
            }
            <span>{{ item.label }}</span>
        </a>
        }
    </nav>

    <!-- optional bottom section, e.g. logout -->
    <div class="border-t border-emerald-800 pt-4">
        <button
            class="flex items-center gap-3 w-full rounded-md px-3 py-2 text-sm font-medium text-emerald-100 hover:bg-emerald-800/60 hover:text-white transition-colors">
            <i class="h-4 w-4 shrink-0 fa-solid fa-arrow-right-from-bracket" aria-hidden="true"></i>
            <span>Log out</span>
        </button>
    </div>

</aside>
