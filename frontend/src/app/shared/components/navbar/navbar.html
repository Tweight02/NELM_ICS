<nav class="flex h-full w-60 flex-col gap-1 border-r border-slate-200 bg-white p-4">
    @for (item of items(); track item.path) {
    <a [routerLink]="item.path" routerLinkActive="bg-slate-900 text-white" [routerLinkActiveOptions]="{ exact: false }"
        class="flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900">
        @if (item.icon) {
        <i class="h-4 w-4 shrink-0" [attr.data-icon]="item.icon"></i>
        }
        <span>{{ item.label }}</span>
    </a>
    }
</nav>
