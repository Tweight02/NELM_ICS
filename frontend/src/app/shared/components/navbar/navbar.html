<aside [class.-translate-x-full]="!open()" [class.translate-x-0]="open()"
    class="w-72 bg-gradient-to-b from-emerald-900 to-emerald-950 h-screen fixed left-0 top-0 z-40 flex flex-col justify-between px-4 py-6 overflow-y-auto transition-transform duration-300 ease-in-out lg:translate-x-0">

    <div>
        <!-- Logo -->
        <div class="flex items-center gap-3 px-2 mb-6">
            <div class="w-10 h-10 rounded-xl bg-emerald-800 flex items-center justify-center text-white shrink-0">
                <i class="fa-solid fa-book-open text-lg" aria-hidden="true"></i>
            </div>
            <div class="leading-tight">
                <div class="font-bold text-white text-sm">North East Luzon Mission</div>
                <div class="text-xs text-emerald-300">Church Ministry Reporting</div>
            </div>
        </div>

        <!-- Portal pill -->
        <div
            class="flex items-center gap-2 bg-white/10 text-emerald-100 font-semibold text-xs px-3 py-2 rounded-full mb-6 mx-2 border border-white/10">
            <span class="w-2 h-2 rounded-full bg-emerald-400 shrink-0"></span>
            {{ portalLabel() }}
        </div>

        <!-- Nav -->
        <nav class="flex flex-col gap-1">
            @for (item of items(); track item.path) {
            <a [routerLink]="item.path" routerLinkActive="bg-emerald-800 text-white"
                [routerLinkActiveOptions]="{ exact: false }" (click)="linkClicked.emit()"
                class="flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium text-emerald-100 transition-colors hover:bg-emerald-800/60 hover:text-white">
                @if (item.icon) {
                <i [class]="'h-4 w-4 shrink-0 fa-solid ' + item.icon" aria-hidden="true"></i>
                }
                <span>{{ item.label }}</span>
            </a>
            }
        </nav>
    </div>

    <!-- Bottom section -->
    <div class="border-t border-emerald-800 pt-4 flex flex-col gap-3">
        <div
            class="flex items-center gap-3 px-3 py-2 rounded-md hover:bg-emerald-800/60 transition-colors cursor-pointer">
            <img src="https://i.pravatar.cc/80?img=13" alt="Ptr. John Doe"
                class="w-9 h-9 rounded-full object-cover shrink-0" />
            <div class="leading-tight flex-1 min-w-0">
                <div class="font-semibold text-white text-sm truncate">Ptr. John Doe</div>
                <div class="text-xs text-emerald-300 truncate">District Pastor</div>
            </div>
            <i class="fa-solid fa-chevron-down text-emerald-400 text-xs shrink-0" aria-hidden="true"></i>
        </div>

        <button
            class="flex items-center gap-3 w-full rounded-md px-3 py-2 text-sm font-medium text-emerald-100 hover:bg-emerald-800/60 hover:text-white transition-colors">
            <i class="fa-solid fa-arrow-right-from-bracket h-4 w-4 shrink-0" aria-hidden="true"></i>
            <span>Log out</span>
        </button>
    </div>

</aside>
