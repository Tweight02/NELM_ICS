<main class="flex-1 px-4 py-6 sm:px-6">
    <!-- Breadcrumb -->
    <nav aria-label="Breadcrumb" class="text-sm mb-6 tracking-wide">
        <ol class="flex items-center">
            <li class="text-slate-400 uppercase text-[10px] font-bold tracking-widest flex items-center gap-1.5">
                <i class="fa-solid fa-house text-[10px]"></i> Church Works
            </li>
            <li class="text-slate-300 mx-2" aria-hidden="true">/</li>
            <li class="text-emerald-600 font-bold uppercase text-[10px] tracking-widest flex items-center gap-1.5"
                aria-current="page">
                <i class="fa-solid fa-file-lines text-[10px]"></i> Church Report
            </li>
        </ol>
    </nav>

    <!-- Header Section -->
    <div class="mb-8 flex flex-col md:flex-row md:items-end md:justify-between gap-4">
        <div>
            <h1 class="font-serif text-3xl md:text-4xl font-bold text-slate-900 mb-2">Church Report Summary</h1>
            <p class="text-slate-500 text-sm">View and filter church activities by department and category</p>
        </div>
        <div class="flex items-center gap-2">
            <button
                class="px-4 py-2.5 text-sm font-semibold text-white bg-emerald-600 rounded-xl hover:bg-emerald-700 transition flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-plus"></i> New Report
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-2xl p-6 border border-slate-200/60 shadow-sm mb-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                <i class="fa-solid fa-filter text-emerald-600"></i> Filter Reports
            </h3>
            <button
                class="text-xs font-semibold text-emerald-600 hover:text-emerald-700 flex items-center gap-1">
                <i class="fa-solid fa-rotate-left"></i> Reset
            </button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <!-- Search -->
            <div class="space-y-2 lg:col-span-1">
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Search</label>
                <div class="relative">
                    <i
                        class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" placeholder="Search..."
                        class="w-full pl-9 pr-3 py-2.5 border border-slate-200 rounded-xl bg-white text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
                </div>
            </div>

            <!-- Church Filter -->
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Church</label>
                <select
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-xl bg-white text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    <option value="">All Churches</option>
                    <option>Church 1</option>
                    <option>Church 2</option>
                    <option>Church 3</option>
                    <option>Church 4</option>
                </select>
            </div>

            <!-- Department Filter -->
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Department</label>
                <select
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-xl bg-white text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    <option value="">All Departments</option>
                    <option>Sabbath School</option>
                    <option>Youth Ministry</option>
                    <option>Childrens</option>
                    <option>Ministerial</option>
                    <option>Womens</option>
                </select>
            </div>

            <!-- Category Filter -->
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Programs</label>
                <select 
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-xl bg-white text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    <option value="">All Programs</option>
                    <option>Sabbath School</option>
                    <option>Seminar</option>
                    <option>Bible Study</option>
                    <option>Training</option>
                    <option>Service</option>
                    <option>Baptism</option>
                </select>
            </div>
        </div>
    </div>
</main>
